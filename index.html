<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Runner - Mouse Control</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: 'Courier New', monospace; cursor: crosshair; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; z-index: 10; display: none; pointer-events: none; }
        #loading-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 20; width: 100%; pointer-events: none;
        }
        .instruction { font-size: 18px; color: #00d4ff; margin-top: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    
    <div id="loading-overlay">
        <div id="status">INITIATING SYSTEMS...</div>
        <div class="instruction">MOVE MOUSE TO STEER | CLICK TO BLAST</div>
        <div id="start-hint" style="display:none; color: #00ff00; font-weight: bold; margin-top: 20px;">
            [ ASSETS READY: SHOOT THE GREEN CORE TO START ]
        </div>
    </div>

    <script>
        let scene, camera, renderer, ship, shipGroup;
        let isLoading = true;
        let score = 0;
        let gameOver = false;
        const lasers = [];
        const enemies = [];
        const loadingTargets = [];
        
        // Mouse Tracking
        const mouse = new THREE.Vector2();
        let isMouseDown = false;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, -12, 22); 
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0x00d4ff, 1.2);
            sun.position.set(5, -5, 10);
            scene.add(sun);

            // Loading Manager
            const manager = new THREE.LoadingManager();
            manager.onLoad = () => {
                document.getElementById('status').style.display = 'none';
                document.getElementById('start-hint').style.display = 'block';
                createStartTarget();
            };

            // Load Ship
            shipGroup = new THREE.Group();
            scene.add(shipGroup);

            const loader = new THREE.GLTFLoader(manager);
            loader.load('main_ship.glb', (gltf) => {
                const model = gltf.scene;
                
                // Fix: Centering the ship (essential for main_ship.glb)
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center); 
                
                model.rotation.x = Math.PI / 2; 
                shipGroup.add(model);
                // Scaling fix for 900-unit model height
                shipGroup.scale.set(0.01, 0.01, 0.01); 
                ship = shipGroup; 
            }, 
            (xhr) => {
                const p = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('status').innerText = `UPLOADING SHIP DATA: ${p}%`;
            });

            // Starfield
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<4000; i++) starPos.push((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*100);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 })));

            // Mouse Listeners
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            window.addEventListener('mousedown', () => isMouseDown = true);
            window.addEventListener('mouseup', () => isMouseDown = false);

            animate();
        }

        function createStartTarget() {
            const target = new THREE.Mesh(
                new THREE.BoxGeometry(4, 2, 2),
                new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x004400 })
            );
            target.position.set(0, 8, 0);
            target.userData = { isStart: true };
            scene.add(target);
            loadingTargets.push(target);
        }

        function spawnEnemy() {
            if (isLoading || gameOver) return;
            const enemy = new THREE.Mesh(
                new THREE.OctahedronGeometry(1.5),
                new THREE.MeshPhongMaterial({ color: 0xff3300, flatShading: true })
            );
            enemy.position.set((Math.random() - 0.5) * 40, 30, 0);
            scene.add(enemy);
            enemies.push(enemy);
            setTimeout(spawnEnemy, Math.max(300, 1200 - (score * 2)));
        }

        let lastFire = 0;
        function fireLaser() {
            const laser = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.1, 1.5),
                new THREE.MeshBasicMaterial({ color: 0x00ffff })
            );
            laser.position.copy(shipGroup.position);
            laser.position.y += 2;
            scene.add(laser);
            lasers.push(laser);
            lastFire = Date.now();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Mouse movement mapping
            const targetX = mouse.x * 22;
            const targetY = mouse.y * 15 + 2; 

            // Smooth following (Lerp)
            shipGroup.position.x += (targetX - shipGroup.position.x) * 0.1;
            shipGroup.position.y += (targetY - shipGroup.position.y) * 0.1;

            // Visual tilt based on movement speed
            shipGroup.rotation.y = -(targetX - shipGroup.position.x) * 0.5;
            shipGroup.rotation.z = (targetX - shipGroup.position.x) * 0.2;

            if (isMouseDown && Date.now() - lastFire > 150) fireLaser();

            // Collision and Movement
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].position.y += 1.2;
                
                loadingTargets.forEach((t, tIdx) => {
                    if (lasers[i] && lasers[i].position.distanceTo(t.position) < 2.5) {
                        if (t.userData.isStart) {
                            isLoading = false;
                            document.getElementById('loading-overlay').style.display = 'none';
                            document.getElementById('ui').style.display = 'block';
                            spawnEnemy();
                        }
                        scene.remove(t);
                        loadingTargets.splice(tIdx, 1);
                    }
                });

                enemies.forEach((e, eIdx) => {
                    if (lasers[i] && lasers[i].position.distanceTo(e.position) < 2) {
                        scene.remove(e);
                        enemies.splice(eIdx, 1);
                        scene.remove(lasers[i]);
                        lasers.splice(i, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                });

                if (lasers[i] && lasers[i].position.y > 40) {
                    scene.remove(lasers[i]);
                    lasers.splice(i, 1);
                }
            }

            enemies.forEach((e, idx) => {
                e.position.y -= 0.2;
                if (e.position.distanceTo(shipGroup.position) < 2.5) {
                    location.reload(); 
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
