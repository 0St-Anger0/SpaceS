<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.5D Space Shooter - Custom Ship</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; z-index: 10; display: none; }
        #loading-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 20; width: 100%;
        }
        .instruction { font-size: 18px; color: #00d4ff; margin-bottom: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    
    <div id="loading-overlay">
        <div id="status">LOADING SHIP ASSETS...</div>
        <div class="instruction">WASD/Arrows to Move | Space to Shoot</div>
        <div id="start-hint" style="display:none; color: #00ff00; font-weight: bold;">SHOOT THE GREEN BLOCK TO START!</div>
    </div>

    <script>
        let scene, camera, renderer, ship;
        let isLoading = true;
        let score = 0;
        let gameOver = false;
        const lasers = [];
        const enemies = [];
        const loadingTargets = [];
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, ' ': false };

        init();

        function init() {
            // --- SCENE SETUP ---
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, -12, 18);
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // --- LIGHTING ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, -5, 10);
            scene.add(sun);

            // --- LOADING MANAGER ---
            const manager = new THREE.LoadingManager();
            manager.onLoad = () => {
                document.getElementById('status').style.display = 'none';
                document.getElementById('start-hint').style.display = 'block';
                createStartTarget();
            };

            // --- LOAD YOUR SHIP ---
            const loader = new THREE.GLTFLoader(manager);
            loader.load('main_ship.glb', (gltf) => {
                ship = gltf.scene;
                
                // Adjusting based on your file's specific data
                ship.scale.set(0.01, 0.01, 0.01); 
                ship.rotation.x = Math.PI / 2; // Lay it flat for flight
                
                scene.add(ship);
            });

            // --- STARFIELD ---
            const starGeo = new THREE.BufferGeometry();
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            const starPos = [];
            for(let i=0; i<3000; i++) starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*50);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            window.addEventListener('keydown', e => keys[e.key] = true);
            window.addEventListener('keyup', e => keys[e.key] = false);

            animate();
        }

        function createStartTarget() {
            const geo = new THREE.BoxGeometry(4, 2, 2);
            const mat = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x003300 });
            const target = new THREE.Mesh(geo, mat);
            target.position.set(0, 10, 0);
            target.userData = { isStartButton: true };
            scene.add(target);
            loadingTargets.push(target);
        }

        function spawnEnemy() {
            if (isLoading || gameOver) return;
            const enemy = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.2, 0),
                new THREE.MeshPhongMaterial({ color: 0xff0044, flatShading: true })
            );
            enemy.position.set((Math.random() - 0.5) * 30, 25, 0);
            scene.add(enemy);
            enemies.push(enemy);
            setTimeout(spawnEnemy, Math.max(400, 1500 - score));
        }

        function fireLaser() {
            if (!ship) return;
            const geo = new THREE.CylinderGeometry(0.1, 0.1, 1.5);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
            const laser = new THREE.Mesh(geo, mat);
            laser.position.copy(ship.position);
            laser.position.y += 2;
            scene.add(laser);
            lasers.push(laser);
        }

        let lastFire = 0;
        function animate() {
            requestAnimationFrame(animate);
            if (!ship) return;

            // Movement Logic
            const speed = 0.35;
            if (keys.w || keys.ArrowUp) ship.position.y += speed;
            if (keys.s || keys.ArrowDown) ship.position.y -= speed;
            if (keys.a || keys.ArrowLeft) { ship.position.x -= speed; ship.rotation.y = 0.4; }
            else if (keys.d || keys.ArrowRight) { ship.position.x += speed; ship.rotation.y = -0.4; }
            else { ship.rotation.y = 0; }

            // Shooting Logic
            if (keys[' '] && Date.now() - lastFire > 200) {
                fireLaser();
                lastFire = Date.now();
            }

            // Laser Movement & Collision
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].position.y += 0.8;
                
                // Check Loading Targets
                loadingTargets.forEach((t, tIdx) => {
                    if (lasers[i] && lasers[i].position.distanceTo(t.position) < 2) {
                        if (t.userData.isStartButton) {
                            isLoading = false;
                            document.getElementById('loading-overlay').style.display = 'none';
                            document.getElementById('ui').style.display = 'block';
                            spawnEnemy();
                        }
                        scene.remove(t);
                        loadingTargets.splice(tIdx, 1);
                    }
                });

                // Check Enemies
                enemies.forEach((e, eIdx) => {
                    if (lasers[i] && lasers[i].position.distanceTo(e.position) < 1.8) {
                        scene.remove(e);
                        enemies.splice(eIdx, 1);
                        scene.remove(lasers[i]);
                        lasers.splice(i, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                });

                if (lasers[i] && lasers[i].position.y > 30) {
                    scene.remove(lasers[i]);
                    lasers.splice(i, 1);
                }
            }

            // Enemy Movement
            enemies.forEach((e, idx) => {
                e.position.y -= 0.15;
                e.rotation.x += 0.02;
                if (e.position.distanceTo(ship.position) < 2) location.reload(); // Simple Game Over
                if (e.position.y < -15) { scene.remove(e); enemies.splice(idx, 1); }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
