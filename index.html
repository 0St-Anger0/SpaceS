<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Strike</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: 'Courier New', monospace; cursor: crosshair; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; z-index: 10; display: none; pointer-events: none; text-shadow: 2px 2px 0 #000; }
        #health-bar { color: #00ff00; margin-top: 10px; font-weight: bold; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; text-align: center;
        }
        #status { font-size: 28px; color: #00d4ff; letter-spacing: 2px; }
        
        /* Ship Selection UI */
        #ship-selection { display: none; margin-top: 30px; }
        .ship-option {
            width: 80px; height: 80px; margin: 0 15px; cursor: pointer;
            border: 3px solid transparent; transition: 0.2s; border-radius: 10px;
        }
        .ship-option:hover { border-color: #00d4ff; transform: scale(1.1); }
        .instruction { font-size: 18px; color: #aaa; margin-top: 15px; }
        
        #start-hint { display: none; color: #00ff00; font-weight: bold; margin-top: 30px; font-size: 20px; letter-spacing: 1px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

        /* Game Over UI */
        #game-over { display: none; flex-direction: column; align-items: center; }
        #game-over h1 { color: #ff3300; font-size: 64px; margin: 0 0 20px 0; text-shadow: 4px 4px 0 #550000; }
        button {
            padding: 15px 30px; font-size: 24px; font-family: 'Courier New', monospace; font-weight: bold;
            background: #00d4ff; color: #000; border: none; cursor: pointer; border-radius: 5px; transition: 0.2s;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px #00d4ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div id="health-bar">HEALTH: ■ ■ ■</div>
    </div>
    
    <div id="overlay">
        <div id="status">INITIATING SYSTEMS...</div>
        
        <div id="ship-selection">
            <h2 style="color: #fff;">SELECT YOUR FIGHTER</h2>
            <div>
                <img src="spaceship.png" class="ship-option" onclick="selectShip(0)">
                <img src="spaceship2.png" class="ship-option" onclick="selectShip(1)">
                <img src="spaceship3.png" class="ship-option" onclick="selectShip(2)">
                <img src="spaceship4.png" class="ship-option" onclick="selectShip(3)">
                <img src="spaceship5.png" class="ship-option" onclick="selectShip(4)">
            </div>
            <div class="instruction">MOVE MOUSE TO STEER | CLICK TO BLAST</div>
        </div>

        <div id="start-hint">[ ASSETS READY: SHOOT THE GREEN CORE TO START ]</div>

        <div id="game-over">
            <h1>MISSION FAILED</h1>
            <button onclick="location.reload()">RESTART SYSTEMS</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, shipGroup, shipSprite;
        let isLoading = true;
        let score = 0;
        let health = 3;
        let gameOver = false;
        
        const lasers = [];
        const enemies = [];
        const powerups = [];
        const particles = [];
        const loadingTargets = [];
        const textures = {};
        
        // Mouse Tracking
        const mouse = new THREE.Vector2();
        let isMouseDown = false;

        class Explosion {
            constructor(pos, color) {
                const particleCount = 15;
                this.meshGroup = new THREE.Group();
                scene.add(this.meshGroup);
                
                const geometry = new THREE.SphereGeometry(0.2, 4, 4);
                const material = new THREE.MeshBasicMaterial({ color: color });

                for (let i = 0; i < particleCount; i++) {
                    const p = new THREE.Mesh(geometry, material);
                    p.userData.velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 0.6,
                        (Math.random() - 0.5) * 0.6,
                        (Math.random() - 0.5) * 0.6
                    );
                    this.meshGroup.add(p);
                }
                this.meshGroup.position.copy(pos);
                this.lifespan = 1.0;
            }

            update() {
                this.lifespan -= 0.03;
                this.meshGroup.children.forEach(p => {
                    p.position.add(p.userData.velocity);
                });
                this.meshGroup.scale.multiplyScalar(0.95);
            }
        }

        init();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000011, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, -12, 22); 
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // Load all Textures
            const manager = new THREE.LoadingManager();
            manager.onLoad = () => {
                document.getElementById('status').style.display = 'none';
                document.getElementById('ship-selection').style.display = 'block';
            };

            const texLoader = new THREE.TextureLoader(manager);
            textures.ships = [
                texLoader.load('spaceship.png'),
                texLoader.load('spaceship2.png'),
                texLoader.load('spaceship3.png'),
                texLoader.load('spaceship4.png'),
                texLoader.load('spaceship5.png')
            ];
            textures.enemy = texLoader.load('enemy.png');
            textures.enemy2 = texLoader.load('enemy2.png');
            textures.enemy2_damage = texLoader.load('enemy2_damage.png');
            textures.enemy2_dead = texLoader.load('enemy2_dead.png');
            textures.battery = texLoader.load('battery.png');

            shipGroup = new THREE.Group();
            scene.add(shipGroup);

            // Starfield
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<4000; i++) starPos.push((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*100);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 })));

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            window.addEventListener('mousedown', () => isMouseDown = true);
            window.addEventListener('mouseup', () => isMouseDown = false);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        // Global scope function for the HTML buttons
        window.selectShip = function(index) {
            const spriteMaterial = new THREE.SpriteMaterial({ map: textures.ships[index], transparent: true });
            shipSprite = new THREE.Sprite(spriteMaterial);
            shipSprite.scale.set(6, 6, 1);
            shipGroup.add(shipSprite);

            document.getElementById('ship-selection').style.display = 'none';
            document.getElementById('start-hint').style.display = 'block';
            
            // Create target to shoot to start
            const target = new THREE.Mesh(
                new THREE.BoxGeometry(4, 2, 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            target.position.set(0, 8, 0);
            target.userData = { isStart: true };
            scene.add(target);
            loadingTargets.push(target);
        };

        function spawnEnemy() {
            if (isLoading || gameOver) return;
            
            const isTank = Math.random() > 0.6; // 40% chance for a Tank
            const mat = new THREE.SpriteMaterial({ 
                map: isTank ? textures.enemy2 : textures.enemy, 
                transparent: true 
            });
            const enemy = new THREE.Sprite(mat);
            
            enemy.scale.set(isTank ? 7 : 5, isTank ? 7 : 5, 1);
            enemy.position.set((Math.random() - 0.5) * 40, 35, 0);
            enemy.userData = { 
                isTank: isTank, 
                health: isTank ? 3 : 1 
            };
            
            scene.add(enemy);
            enemies.push(enemy);
            
            setTimeout(spawnEnemy, Math.max(400, 1500 - (score * 2)));
        }

        function dropBattery(pos) {
            const bat = new THREE.Sprite(new THREE.SpriteMaterial({ map: textures.battery, transparent: true }));
            bat.position.copy(pos);
            bat.scale.set(3, 3, 1);
            scene.add(bat);
            powerups.push(bat);
        }

        function updateHealthUI() {
            let str = "HEALTH: ";
            for(let i=0; i<3; i++) str += (i < health) ? "■ " : "□ ";
            const hb = document.getElementById('health-bar');
            hb.innerText = str;
            hb.style.color = health === 1 ? '#ff3300' : '#00ff00';
            
            if (health <= 0) {
                gameOver = true;
                scene.remove(shipGroup);
                particles.push(new Explosion(shipGroup.position, 0x00d4ff));
                document.getElementById('overlay').style.background = 'rgba(0,0,0,0.9)';
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('status').style.display = 'none';
                document.getElementById('start-hint').style.display = 'none';
                document.getElementById('ship-selection').style.display = 'none';
                document.getElementById('game-over').style.display = 'flex';
            }
        }

        let lastFire = 0;
        function fireLaser() {
            const laser = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.1, 1.5),
                new THREE.MeshBasicMaterial({ color: 0x00ffff })
            );
            laser.position.copy(shipGroup.position);
            laser.position.y += 2;
            laser.rotation.x = Math.PI / 2;
            scene.add(laser);
            lasers.push(laser);
            lastFire = Date.now();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!gameOver && !isLoading) {
                const targetX = mouse.x * 22;
                const targetY = mouse.y * 15 + 2; 
                shipGroup.position.x += (targetX - shipGroup.position.x) * 0.15;
                shipGroup.position.y += (targetY - shipGroup.position.y) * 0.15;

                if (isMouseDown && Date.now() - lastFire > 150) fireLaser();
            }

            // Update Explosions
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].lifespan <= 0) {
                    scene.remove(particles[i].meshGroup);
                    particles.splice(i, 1);
                }
            }

            // Powerups (Batteries)
            for (let i = powerups.length - 1; i >= 0; i--) {
                powerups[i].position.y -= 0.15;
                if (!gameOver && powerups[i].position.distanceTo(shipGroup.position) < 3.5) {
                    health = Math.min(3, health + 1);
                    updateHealthUI();
                    scene.remove(powerups[i]);
                    powerups.splice(i, 1);
                } else if (powerups[i].position.y < -20) {
                    scene.remove(powerups[i]);
                    powerups.splice(i, 1);
                }
            }

            // Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].position.y += 1.2;
                let laserRemoved = false;
                
                loadingTargets.forEach((t, tIdx) => {
                    if (!laserRemoved && lasers[i].position.distanceTo(t.position) < 2.5) {
                        isLoading = false;
                        document.getElementById('overlay').style.display = 'none';
                        document.getElementById('ui').style.display = 'block';
                        scene.remove(t);
                        loadingTargets.splice(tIdx, 1);
                        scene.remove(lasers[i]);
                        lasers.splice(i, 1);
                        laserRemoved = true;
                        spawnEnemy();
                    }
                });

                if (laserRemoved) continue;

                for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                    let e = enemies[eIdx];
                    let hitRadius = e.userData.isTank ? 3.5 : 2.5;
                    
                    if (lasers[i].position.distanceTo(e.position) < hitRadius) {
                        e.userData.health -= 1;
                        scene.remove(lasers[i]);
                        lasers.splice(i, 1);
                        laserRemoved = true;

                        if (e.userData.health <= 0) {
                            if (e.userData.isTank) {
                                // Briefly show dead texture before exploding
                                e.material.map = textures.enemy2_dead;
                                if (Math.random() > 0.4) dropBattery(e.position); // 60% drop rate for tanks
                            } else {
                                if (Math.random() > 0.9) dropBattery(e.position); // 10% drop rate for scouts
                            }
                            
                            particles.push(new Explosion(e.position, e.userData.isTank ? 0xffff00 : 0xff3300));
                            scene.remove(e);
                            enemies.splice(eIdx, 1);
                            score += e.userData.isTank ? 30 : 10;
                            document.getElementById('score').innerText = score;
                        } else if (e.userData.isTank && e.userData.health === 1) {
                            e.material.map = textures.enemy2_damage;
                        }
                        break;
                    }
                }

                if (!laserRemoved && lasers[i].position.y > 40) {
                    scene.remove(lasers[i]);
                    lasers.splice(i, 1);
                }
            }

            // Enemies
            for (let idx = enemies.length - 1; idx >= 0; idx--) {
                let e = enemies[idx];
                e.position.y -= e.userData.isTank ? 0.1 : 0.25;
                
                if (!gameOver && e.position.distanceTo(shipGroup.position) < (e.userData.isTank ? 4.0 : 3.0)) {
                    particles.push(new Explosion(e.position, 0xff5500));
                    scene.remove(e);
                    enemies.splice(idx, 1);
                    health -= 1;
                    updateHealthUI();
                } else if (e.position.y < -20) {
                    scene.remove(e);
                    enemies.splice(idx, 1);
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
